name: bioscale_mobile
description: "BioScale - Body Composition Analysis via BLE Smart Scales"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_blue_plus: ^1.35.0
  sqflite: ^2.4.0
  path_provider: ^2.1.0
  path: ^1.9.0
  fl_chart: ^0.70.0
  flutter_riverpod: ^2.6.0
  go_router: ^14.0.0
  google_fonts: ^6.2.0
  share_plus: ^10.0.0
  permission_handler: ^11.3.0
  intl: ^0.19.0
  collection: ^1.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#4A90D9"
  adaptive_icon_foreground: "assets/icon/app_icon_foreground.png"

flutter:
  uses-material-design: true
  assets:
    - assets/i18n/
    - assets/icons/
